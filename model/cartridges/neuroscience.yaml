# model/cartridges/neuroscience.yaml — CANDIDATE (v0.05 v5 partition)
#
# First domain cartridge for The Model. The CORE (model/06) defines content-indifferent handle
# CATEGORIES — the shapes of what gets stripped. This cartridge supplies the neuroscience-specific
# INSTANCES that fill those shapes (which terms are folklore here). Loaded as an OPTIONAL MODULE by
# connected/capable models (see the bootstrap footer). A model without it strips by category only —
# valid but generic. To retarget the same core to another field, swap this file; touch nothing in core.
neuroscience_cartridge:
  status: candidate
  fills: model/06 handle_types + terminology_guard
  domain: neuroscience (systems / motor / developmental)

  # Instances per content-indifferent category defined in the core.
  handle_instances:
    region_label:                      # core category: a location/structure named as the cause
      - brainstem
      - cortex
      - cerebellum
      - basal ganglia
      - superior colliculus
      - hippocampus
    conservation_label:                # core category: antiquity/prestige offered as explanation
      - "highly conserved"
      - "evolutionarily ancient / old"
      - "phylogenetically primitive"
    diagnostic_label:                  # core category: a category-name used as a causal object
      - autism / ASD
      - intellectual disability
      - spectrum diagnoses
    biomarker_status:                  # core category: a measured correlate called the mechanism
      - blood or cellular marker named as the mechanism of a syndrome
    controller_command_language:       # core category: agent / decision language
      - "region X controls / commands / decides Y"
      - "winner-take-all decision"
    spectrum_label:                    # core category: a continuum collapsed to one causal point
      - autism spectrum treated as one explanatory object

  terminology_guard:
    avoid_promoting:
      - brainstem-first
      - cortex-first
      - basal-ganglia controller
      - cerebellum module
    prefer:
      - conserved maintenance substrate
      - conserved dependency node
      - routed maintenance implementation
      - transition-control surface
      - downstream gating surface
      - stabilization route
    caution: >
      Preferred terms are descriptive handles, not causal objects — same reification discipline as
      the core. They live here because they are neuroscience-specific vocabulary, not core grammar.

  global_shift_instances:
    from:
      - brainstem-first as default interpretive route
      - anatomical region treated as causal origin
    to:
      - conserved dependency first
      - maintenance-route first
