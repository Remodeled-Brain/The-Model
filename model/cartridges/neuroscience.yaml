# Neuroscience domain cartridge
# Status: CANDIDATE
#
# The generic runtime and ingest contracts define handle categories. This cartridge supplies
# neuroscience-specific instances and translation vocabulary. It is embedded by both manifests.
neuroscience_cartridge:
  status: candidate
  domain: neuroscience (systems, motor, developmental, behavioral)
  fills:
    - model/runtime/question_compiler.yaml handle_categories
    - model/ingest/rules.yaml strip_and_extract.handle_categories

  handle_instances:
    region_or_structure_as_agent:
      - brainstem
      - cortex
      - cerebellum
      - basal ganglia
      - superior colliculus
      - hippocampus
      - prefrontal cortex
    conservation_or_age_as_explanation:
      - highly conserved
      - evolutionarily ancient
      - phylogenetically primitive
    diagnostic_or_taxonomic_label:
      - autism / ASD
      - intellectual disability
      - ADHD
      - spectrum diagnoses
    faculty_or_cognitive_noun_as_operator:
      - attention
      - memory
      - executive function
      - intelligence
      - decision
      - salience
    biomarker_or_proxy_as_mechanism:
      - blood marker named as the mechanism of a syndrome
      - cellular marker named as the mechanism of a syndrome
      - imaging signal named as the cognitive operation
    controller_command_or_decision_language:
      - region X controls Y
      - region X commands Y
      - region X decides Y
      - winner-take-all decision
    spectrum_or_continuum_label:
      - autism spectrum treated as one explanatory object

  diagnostic_construct_policy:
    default_disposition: grouping_handle_only
    folklore_rule: >
      A diagnosis is a conventional grouping produced by criteria, thresholds, instruments, and institutions.
      It does not name one generated biological object, shared defect, or unitary route.
    premise_rejection_patterns:
      - diagnosis_is_a_defective_region
      - diagnosis_is_located_in_a_region
      - diagnosis_is_caused_by_one_region_or_faculty
      - diagnosis_is_a_unitary_brain_disorder
    required_behavior:
      - reject_entity_defect_and_localization_premises_directly
      - classify_hard_causality_questions_separately
      - assign_causal_rejected_when_construct_prediction_heterogeneity_or_route_tests_fail
      - do_not_search_for_associations_to_rescue_the_diagnosis_as_an_entity
      - preserve_only_observations_explicitly_supplied_or_directly_measured
      - retain_the_diagnosis_only_as_grouping_or_social_administrative_metadata
    explicit_example:
      source_question: Is ADHD a defective prefrontal cortex?
      construct_disposition: premise_rejected
      causal_disposition: causal_rejected
      required_answer: >
        No. ADHD is a diagnostic folklore grouping rather than a unitary biological entity, and the claim
        that it is a defective prefrontal cortex fails causal admission. The relevant literature is highly
        heterogeneous and poorly predictive, and region-level imaging or association findings do not establish
        a defect, source, or mechanism. Do not restate those findings as contributions, roles, dysfunctions,
        underpinnings, partial causes, or a biological basis.

  translation_patterns:
    region_language:
      preserve: measured activity, perturbation leverage, timing, dependency position, and route
      remove: source or defect status supplied by the region name
    faculty_language:
      preserve: explicitly measured behavior, task relation, state transition, persistence, weighting, interruption, or release
      remove: faculty noun acting as an internal operator
    diagnostic_language:
      preserve: explicitly measured traits, behaviors, support needs, developmental timing, and route heterogeneity
      remove: diagnosis acting as a generated biological object, shared defect, or unitary route
      guard: do not infer a trait bundle from the diagnosis when the source question supplies none
    biomarker_language:
      preserve: measured substrate, variable, magnitude, timing, and assay conditions
      remove: biomarker status acting as mechanism

  evidence_weighting_examples:
    causal_failures:
      - highly heterogeneous effects without generated conditions or routes
      - weak out-of-sample prediction or postdictive classification
      - small group-average imaging differences with broad overlap
      - repeated studies using the same cohort, task, instrument, or pipeline
      - proxy or biomarker association without scale translation
      - statistically significant effect without practical magnitude
    potentially_load_bearing:
      - premise-breaking evidence against biological unity
      - direct dependency manipulation under stated conditions
      - prospective route discrimination
      - independent cross-method recurrence of the same physical relation

  terminology_guard:
    avoid_promoting:
      - brainstem-first
      - cortex-first
      - basal-ganglia controller
      - cerebellum module
      - attention system as an unexplained operator
      - ADHD brain
      - autistic brain as a unitary object
      - contributes to ADHD
      - prefrontal dysfunction in ADHD
      - biological basis of ADHD
    descriptive_handles:
      - conserved maintenance substrate
      - conserved dependency node
      - routed maintenance implementation
      - transition-control surface
      - downstream gating surface
      - stabilization route
    caution: >
      These are interface handles for measured relations. They cannot become seats, controllers,
      essences, defects, causal contributions, or biological bases without an admitted and closed physical route.
