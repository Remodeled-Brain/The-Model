neuroscience_folk_behavior:
  status: candidate
  layer: domain_cartridge
  generic_ref: model/kernel/folk_behavior_construct.yaml#folk_behavior_construct
  runtime_gate_ref: model/runtime/folk_behavior_compiler_gate.yaml#folk_behavior_compiler_gate
  ingest_gate_ref: model/ingest/folk_behavior_extraction_gate.yaml#folk_behavior_extraction_gate
  fixture_ref: model/cartridges/neuroscience_folk_behavior_fixtures.json
  purpose: >
    Apply folk-behavior reconstruction to neuroscience, neuromodulation, imaging, and clinical-neurobehavioral claims.

  handle_instances:
    folk_behavior_trait_or_disposition_label:
      - procrastination
      - impulsivity
      - motivation
      - self-control
      - avoidance
      - effort
      - willpower
      - persistence
      - risk taking
    ecological_generalization_from_task_content:
      - real-world task
      - daily-life behavior
      - naturalistic task
      - ecologically valid behavior
    mediator_or_faculty_as_carrier:
      - task outcome value
      - reward valuation
      - motivation increase
      - enhanced self-control
      - top-down regulation

  neuroscience_rule: >
    A folk behavior does not become a neural target because a region, stimulation montage, imaging signal, mediator,
    or cognitive theory is attached to it. The source must first identify the exact measured event and conditions.
    Regional targeting and target engagement, physical and metabolic route, organism-state transition, and ecological
    transport remain separate bridges.

  stimulation_claims:
    required_relation_split:
      - assignment_to_complete_protocol_to_recorded_outcome
      - delivered_current_or_field_to_target_tissue_state
      - target_tissue_state_to_recorded_behavior
      - stimulation_to_folk_behavior_construct
      - stimulation_to_claimed_real_world_scope
      - mediator_to_recorded_behavior
    rules:
      - programmed_device_output_is_not_target_engagement
      - modeled_field_is_not_measured_tissue_state_change
      - regional_name_is_not_a_behavioral_operator
      - randomization_applies_to_the_assigned_protocol
      - a_sham_contrast_does_not_isolate_every_protocol_component_automatically
      - statistical_mediation_does_not_identify_a_physical_route
      - practical_deployment_residue_bears_on_transportability_and_effect_class

  procrastination_translation:
    source_handle: procrastination
    default_disposition: grouping_handle_only
    possible_measured_relations_only_when_explicitly_supplied:
      - latency_before_starting_a_selected_task
      - percentage_of_a_selected_task_reported_complete
      - completion_by_a_selected_deadline
      - frequency_of_delay_under_a_defined_task_protocol
      - uploaded_or_observer_verified_completion_event
      - self_report_scale_or_classification_threshold
    prohibited_inference: >
      Do not infer a common route, trait, deficit, aversion, motivation state, self-control failure, or biological target
      across these relations. Preserve only the measurements actually made by the source.

  real_world_scope_rule: >
    Self-selected ordinary-life tasks performed during repeated research visits, prompting, monitoring, reporting,
    verification, or scoring remain protocol-bound. Their ordinary content does not establish portable real-world effect.

  paper_regression:
    source_claim: DLPFC stimulation reduces real-world procrastination by increasing task outcome value.
    required_result:
      - classify_procrastination_as_grouping_handle_only
      - preserve_exact_recorded_task_events_under_protocol
      - keep_protocol_assignment_separate_from_current_as_active_component
      - require_delivered_target_engagement_before_regional_causality
      - reject_task_outcome_value_as_a_causal_carrier_without_independent_intervention_and_route
      - reject_real_world_scope_without_transportability_evidence
      - withhold_actual_causality_when_manipulation_identity_attrition_analysis_or_replication_burdens_remain_open
    forbidden_result:
      - stimulation_caused_reduced_procrastination
      - DLPFC_enhancement_caused_behavior
      - mediation_established_the_mechanism
      - ordinary_life_tasks_established_real_world_effectiveness
