v0_05_v4_ingest_architecture:
  status: candidate
  layer: paper_ingest
  purpose: >
    Increase ingest rigor and internal consistency by catching folklore,
    regionalization, proxy-promotion, practical-significance inflation,
    chain breaks, and spectrum compression before node mapping.

  core_principle:
    name: INGEST.PRINCIPLE.05v4
    definition: >
      Ingest runs in two phases. Phase A (admissibility) strips author-interface text and
      extracts claim fields: measured substrate, measured variable, grouping variable, and the
      post_strip_claim (the physical claim that remains once diagnostic, region, biomarker,
      spectrum, controller, and conservation terms are treated as handles). Phase A asks only
      whether a physical claim survives stripping; it weighs no evidence. Phase B (validation)
      runs only after claim fields exist: it weights evidence, runs interacting route-closure
      tests, and assigns a support role and weight cap. Labels are handles and never perform
      causal work. Node mapping consumes extracted claim fields, never author labels.
    ordering_rule: >
      Author-interface stripping and claim-field extraction (Phase A) run before node mapping.
      Evidence weighting and validation (Phase B) run only after extracted claim fields exist.
      "Folklore filters before validation" is implemented as this A-before-B phase split, not as
      a single ordered slogan.
    note_on_prior_wording: >
      Earlier drafts used "residue" as a structural noun and mapped "surviving residue" to nodes.
      That fused the strip operation with its product. The field is now named post_strip_claim,
      produced in Phase A; only Phase B assigns it a role.

  phase_A_admissibility:
    purpose: Structural. Strip author interface and extract claim fields. No evidence weighting.
    steps:
      - strip_author_interface_text
      - run_strip_and_extract_gate
    strip_and_extract_gate:
      consolidates:
        - LABEL_REMOVAL_RESIDUE_TEST
        - FOLKLORE_FILTER_DIAGNOSTIC_LABEL
        - SPECTRUM_COMPRESSION_FILTER
        - CONTROLLER_LANGUAGE_FILTER
        - BIOMARKER_STATUS_FILTER
        - REGION_LABEL_FILTER
      handle_types:
        - diagnostic_label
        - spectrum_label
        - controller_command_language
        - biomarker_status
        - region_label
        - conservation_label
        - clinical_promise_language
      output:
        - measured_substrate
        - measured_variable
        - grouping_variable
        - post_strip_claim
        - handle_dependencies
        - handle_flags   # structural markers (e.g. label_precedes_measurement) adjudicated in Phase B
      phase_A_is_structural: >
        Phase A raises handle_flags but does not adjudicate them. It fails admissibility only when no
        post_strip_claim survives handle removal. All evidentiary judgment is deferred to Phase B.
      claim_form: see model/06 post_strip_claim_form (reserved_for_v0_07)
      admissibility_verdict:
        admissible_if: a post_strip_claim exists after handles are removed
        inadmissible_if: no physical claim survives handle removal
        note: admissibility is structural only; it does not judge evidentiary strength

  phase_B_validation:
    purpose: >
      Runs only after Phase A produces claim fields. Extract-first lets interacting tests resolve
      together rather than in a brittle linear order.
    interacting_gates:
      - region_source_closure                        # region as implementation unless source demonstrated
      - conservation_dependency                      # conservation is ingest-priority handle, not weight
      - proxy_promotion                              # proxy != mechanism without translation controls
      - practical_significance                       # analytical separability != biological/clinical weight
      - controlled_sameness_missing_differentiator   # merged chain-break + controlled-frame
    adjudicates_handle_flags: >
      Phase B consumes the handle_flags raised in Phase A (e.g. label_precedes_measurement,
      region_used_as_origin, proxy_present) and decides role and weight from them. The flags are the
      evidentiary questions; Phase A only recorded them.
    interaction_note: >
      region_source_closure and conservation_dependency can affect each other; both run on the
      already-extracted claim fields before roles are assigned, so ordering between them does not
      change the outcome.
    output:
      - causal_frame_status
      - missing_route_slots
      - chain_closure_status
      - proxy_status
      - translation_limit
      - support_type          # from the support_type_ladder in 05
      - weight_cap

  map_surviving_claim_to_nodes:
    input_required:
      - measured_substrate
      - measured_variable
      - post_strip_claim
      - proxy_status
      - chain_closure_status
      - translation_limit

  write_support_layer_only:
    allowed_writes:
      - evidence
      - provenance
      - paper_links
      - extraction_notes
      - disconfirmation_notes
      - method_notes
      - category_failure_notes
      - proxy_status_notes
      - missing_route_notes
      - descriptive_support_notes
      - source_tree_handles
      - watch_items
      - promotion_candidates
      - promotion_gate_results

  mark_promotion_candidates_only_after_gates_pass:
    blocked_if:
      - no_post_strip_claim
      - causal_route_unclosed
      - proxy_promoted_to_mechanism
      - diagnostic_label_required_for_mapping
      - region_label_required_for_origin
      - conservation_used_as_weight

  validator_invariants:
    two_phase_order_required: true
    phase_A_admissibility_before_phase_B_validation: true
    admissibility_flags_in_phase_A_evidentiary_adjudication_in_phase_B: true
    # Phase A records handle_flags (structural markers) and decides only whether a post_strip_claim
    # exists; the evidentiary predicates behind those flags are adjudicated by Phase B gates, not A.
    # (Deeper follow-up: relabel 06 handle_types `fail_if` -> `flags` and move any predicate that
    #  weighs method/route evidence to its Phase B gate. Tracked as an open item.)
    node_mapping_requires_post_strip_claim: true
    support_layer_only_during_ingest: true
    promotion_candidate_requires_prior_gates_passed: true
    diagnostic_label_can_group_but_cannot_ground: true
    region_label_cannot_supply_origin: true
    conservation_priority_cannot_feed_weight_directly: true
    analytical_significance_cannot_feed_weight_directly: true
    failed_gate_routes_claim_to_lower_weight_channel_by_default: true
    support_only_notes_cannot_ground_by_raw_count: true
