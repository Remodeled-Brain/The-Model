folk_behavior_construct:
  status: candidate
  layer: shared_kernel
  purpose: >
    Prevent familiar behavioral labels from entering evidence review as unitary states, traits, deficits,
    mechanisms, treatment targets, or portable outcomes. Translate the label into the exact measured
    organism-state relation before design strength, statistical result, intervention status, or regional
    language can receive evidentiary weight.

  applies_before:
    - evidence_retrieval
    - design_admission
    - causal_weighting
    - mechanism_search
    - intervention_effectiveness_language

  handle_categories:
    - folk_behavior_trait_or_disposition_label
    - context_compressed_behavioral_target
    - moralized_or_normative_behavior_label
    - latent_faculty_inferred_from_behavior
    - ecological_generalization_from_task_content

  detection_triggers:
    - one familiar word compresses multiple possible actions timings constraints incentives or routes
    - the label supplies the outcome identity more strongly than the measurement operation does
    - a scale threshold task or classification rule is treated as direct access to the named behavior
    - an intervention is described as treating reducing correcting or normalizing the label
    - ordinary-life task content is used to claim real-world ecological validity
    - a mediator or regional term is used to connect the intervention to the folk target by name

  non_exemptions:
    - familiar_everyday_language
    - common_academic_usage
    - validated_scale_or_questionnaire
    - preregistered_label
    - randomized_design
    - statistically_significant_result
    - large_effect_size
    - clinical_or_policy_acceptance

  default_disposition:
    construct: grouping_handle_only
    construct_level_causal_target: causal_rejected
    exact_independently_measured_relation: eligible_for_separate_review
    rule: >
      The label may organize records or conversation. It cannot provide biological unity, outcome identity,
      causal homogeneity, route identity, or treatment efficacy. A construct-level target can escape this
      disposition only through independent measurement demonstrating the same generated state relation,
      conditions, and dependency across the claimed scope.

  required_decomposition:
    fields:
      - overt_event_or_transition
      - initiation_latency_or_temporal_relation
      - completion_or_termination_condition
      - task_and_environmental_conditions
      - incentive_cost_aversion_or_competing_transition_structure
      - relevant_prior_state_and_constraints
      - observation_or_reporting_operation
      - threshold_aggregation_or_classification_rule
      - tested_time_horizon
      - tested_population_and_context
      - claimed_ecological_scope
      - unresolved_sources_of_within_label_variation
    missing_field_rule: >
      Record an unavailable field as unresolved. Do not infer a stereotyped behavior bundle from the label.
      Different measurements under the same label remain separate target relations unless their physical and
      operational equivalence is demonstrated.

  reconstruction_rules:
    - remove_the_folk_label_from_the_causal_operator_and_outcome_identity
    - preserve_only_behaviors_timings_conditions_and_measurements_explicitly_supplied
    - keep_distinct_behavioral_relations_separate_when_the_label_groups_them
    - bind_intervention_evidence_only_to_the_exact_measured_relation_under_the_tested_protocol
    - require_a_separate_bridge_from_protocol_bound_measurement_to_portable_real_world_effect
    - require_a_separate_bridge_from_score_or_report_to_organism_state
    - require_a_separate_bridge_from_mediator_label_to_physical_carrier_and_dependency
    - require_a_separate_bridge_from_regional_targeting_to_delivered_target_engagement

  ecological_scope_rule: >
    Ordinary-life task content does not establish real-world efficacy. Ecological scope is generated by the
    conditions that selected, constrained, prompted, observed, reported, and scored the behavior. A protocol-bound
    measurement remains protocol-bound until transport across those conditions is affirmatively demonstrated.

  intervention_rule: >
    Randomization and comparison apply to the object actually assigned. They do not convert a folk target into a
    unitary outcome or isolate a named active component from the surrounding protocol. The exact assigned protocol
    to exact recorded behavior relation must pass its own causal burden. Treatment of the folk construct remains a
    separate rejected target unless construct unity and transportability close.

  mediator_rule: >
    A reported value, motivation, desire, self-control, avoidance, effort, salience, or similar mediator is a
    measurement or label until a physical variable, timing, intervention, and dependency path are independently
    exposed. Statistical mediation cannot make the folk term a causal carrier.

  hard_failures:
    - folk_label_treated_as_unitary_biological_or_behavioral_entity
    - label_change_treated_as_treatment_of_one_target
    - score_change_renamed_as_reduction_of_the_folk_construct
    - ordinary_life_task_content_renamed_as_real_world_efficacy
    - regional_or_faculty_language_supplies_the_missing_operator
    - mediation_supplies_a_physical_dependency_by_statistical_arrangement
    - effect_magnitude_repairs_construct_identity

  preservation_rule: >
    Construct rejection must not erase a valid observation. Preserve the exact initiation, delay, completion,
    interruption, report, score, deadline relation, or other measured event at its measured scope. Route failed
    construct-level claims to label-dependent, descriptive, proxy, method, disconfirmation, or provenance channels
    as appropriate.

  forbidden_outputs:
    - intervention_reduced_the_folk_label_when_only_a_protocol_measure_changed
    - region_controls_the_folk_behavior
    - folk_term_as_a_latent_physical_state_without_independent_measurement
    - real_world_effect_from_real_world_task_content_alone
    - familiar_label_as_construct_escape
    - construct_level_efficacy_inherited_from_an_exact_measurement_contrast
