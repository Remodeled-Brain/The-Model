chain_contract:
  status: candidate
  layer: runtime_kernel
  purpose: Define the physical structure every compiled question, evidence binding, and answer must preserve.

  binding_chain:
    sequence:
      - physics
      - chemistry
      - biology
      - behavior
    rule: Each later layer remains generated through the preceding physical layers.

  invariants:
    every_explanatory_term_must_degrade_to_a_physical_path: true
    labels_may_group_but_cannot_generate: true
    implementation_location_cannot_supply_origin_by_name: true
    observed_difference_cannot_supply_its_missing_differentiator: true
    proxy_cannot_supply_mechanism_without_translation: true
    operation_and_product_remain_distinct: true
    question_reconstruction_must_preserve_the_observation: true
    observations_may_not_be_inferred_from_a_label_definition: true
    downstream_evidence_cannot_rescue_a_rejected_construct: true
    publication_volume_cannot_outweigh_failure_of_a_required_premise: true
    causal_language_requires_causal_admission: true
    heterogeneous_poorly_predictive_work_cannot_be_rephrased_as_causal: true

  construct_admission:
    owner: model/kernel/chain_contract.yaml
    purpose: Prevent conventional labels and faculty nouns from entering the chain as biological entities.
    dispositions:
      - admitted
      - grouping_handle_only
      - premise_rejected
      - underspecified
    meanings:
      admitted: The questioned relation is specified through independently measurable variables and may enter chain construction.
      grouping_handle_only: The term may identify an administrative, sampling, or descriptive grouping but supplies no causal unity.
      premise_rejected: The question assigns entity, defect, source, or mechanism status to a handle that has no independently generated physical referent.
      underspecified: An explicit observation exists but the variables required to construct the requested relation are absent.
    required_tests:
      - the proposed entity can be specified independently of the label used to name it
      - group membership does not supply biological unity or a shared route
      - the proposed defect or source relation is measured rather than inferred from a region or diagnosis name
      - at least one observation or state relation exists independently of the questioned handle
    rejection_rules:
      - If all biological content is supplied by a diagnostic, taxonomic, faculty, spectrum, or controller handle, reject the premise.
      - If a diagnostic label is treated as a unitary defect, mechanism, or object located in a named region, reject the premise.
      - A rejected premise stops mechanism search for the labeled entity.
      - Preserve only observations explicitly supplied by the question or directly measured by evidence.
      - Do not manufacture a trait bundle, support-need profile, or surrogate phenotype from a label definition.
      - A rejected label may remain visible only as a grouping or social-administrative handle.
    consumer_rule: Runtime and ingest consumers must reference these dispositions and may not rescue a rejected premise through evidence retrieval.

  causal_claim_admission:
    owner: model/kernel/chain_contract.yaml
    trigger_terms:
      - cause
      - caused_by
      - defect
      - dysfunction
      - controls
      - drives
      - underlies
      - mechanism
      - responsible_for
      - located_in
      - biological_basis
    dispositions:
      - causal_admitted
      - causal_rejected
      - causal_unresolved
      - not_a_causal_question
    meanings:
      causal_admitted: The requested causal relation has an admitted construct, a closed or discriminated route, and evidence that survives every required causal test.
      causal_rejected: A required construct, direction, route, predictive, heterogeneity, or translation premise fails, so the requested causal proposition must be rejected.
      causal_unresolved: The construct and target relation are admissible, but evidence does not yet close or break the causal route.
      not_a_causal_question: The source question requests description or interpretation without causal attribution.
    required_tests:
      - construct_is_admitted_independently_of_the_label
      - target_relation_is_directly_specified_and_measurable
      - temporal_order_supports_the_claimed_direction
      - intervention_or_dependency_evidence_bears_on_the_required_route
      - route_specific_predictions_recur_out_of_sample
      - predictive_performance_exceeds_realistic_baselines_and_survives_relevant_comparators
      - heterogeneity_is_bounded_by_conditions_or_generated_routes
      - effect_magnitude_is_practically_relevant_relative_to_overlap_variance_and_noise
      - scale_translation_is_physically_closed
      - independent_evidence_families_converge_on_the_same_required_relation
      - relevant_disconfirmation_does_not_break_a_required_premise_or_segment
    hard_failure_rules:
      - A rejected construct forces causal_rejected.
      - Highly heterogeneous effects without route-bounded conditions force causal_rejected for a unitary causal claim.
      - Poor out-of-sample prediction forbids causal restatement of group-level associations.
      - Postdictive separation cannot satisfy prediction, direction, or generative-route requirements.
      - Small overlapping group differences cannot establish a defect, dysfunction, or individual causal state.
      - A named region cannot become a defect, source, or controller from localization, activity, or perturbability alone.
      - Any failed necessary causal test defeats downstream records that presuppose the failed relation.
    language_rule: >
      Causal verbs and causal-feeling paraphrases are forbidden unless the disposition is causal_admitted.
      After causal_rejected, do not restate associations as contributions, roles, bases, dysfunctions,
      deficits, mechanisms, underpinnings, mediation, or partial causes.
    answer_rule: >
      A hard causality question with causal_rejected must receive a direct rejection before any descriptive
      context. Descriptive findings may be mentioned only when necessary to explain why they fail causal admission.
    consumer_rule: Runtime and ingest consumers must reference these dispositions and may not soften causal rejection into mixed, complex, multifactorial, associated, or may-contribute language.

  chain_segment:
    required_fields:
      - source_substrate
      - operation
      - carried_change
      - target_substrate_or_state
      - direction_or_dependency
      - timing
      - constraints
      - measured_scale
      - evidence_status
      - unresolved_route_slots
    join_requirements:
      - upstream_output_matches_downstream_input
      - temporal_order_matches_claimed_direction
      - scale_crossing_has_an_explicit_carrier_or_dependency
      - constraints_remain_compatible_across_the_join
      - no_author_label_supplies_the_missing_operation
    join_failure: open_chain_slot

  operation_grammar:
    purpose: Describe what a physical route does to reachable organism states without inventing a controller.
    operations:
      make_available: Add a reachable transition or route under stated constraints.
      weight: Alter the relative tendency of already available transitions.
      stabilize: Keep a state or route within a viable range over time.
      suppress_or_block: Reduce or prevent a transition from becoming executable.
      release: Remove a constraint that prevented an available transition from executing.
      maintain: Continue the physical conditions required for a state or route.
      switch: Change which available route is currently stabilized or executable.
      differentiate: Add route, state, or interface distinctions through development or learning.
      redeploy: Reuse an existing viable operation in a later-added route or interface.
    guard: An operation must name a physical change and its carrier, not an internal agent.

  organism_state_contract:
    definition: >
      A behavior-level explanation identifies a reachable or stabilizable organism-state transition
      under constraint and the physical route that changes its availability, weighting, stabilization,
      blocking, release, maintenance, switching, differentiation, or redeployment.
    required_questions:
      - What organism-state relation is changed or maintained?
      - Which operation changes that relation?
      - What substrate and dependency path carry the change?
      - Which constraints define viability and reachability?
      - Which observations distinguish source, route, implementation, and readout?

  route_roles:
    source: The dependency whose change initiates the required segment under the tested conditions.
    route: The physical path carrying the change.
    implementation: A substrate on which the route is expressed or can be perturbed.
    readout: A measured consequence that may remain downstream or proxy-limited.
    rule: Role assignment requires timing and dependency evidence; location and perturbability alone are insufficient.

  scale_translation:
    required_fields:
      - source_scale
      - target_scale
      - carried_variable
      - intermediate_dependencies
      - temporal_order
      - constraints
      - translation_limit
    closure_rule: >
      A scale transition closes only when a demonstrated physical dependency carries the measured
      change from the source scale into the target relation required by the question.
    shared_vocabulary_closes_translation: false

  route_discrimination:
    required_when_multiple_routes_survive:
      - competing_route_predictions
      - discriminating_measurement_or_perturbation
      - expected_temporal_difference
      - compensation_or_redundancy_check
    rule: Retain alternative routes until an observation distinguishes their generated consequences.

  closure_vocabulary:
    owner: model/kernel/chain_contract.yaml
    states:
      - closed
      - partial
      - descriptive_only
      - source_scale_only
      - proxy_limited
      - label_dependent
      - contested
      - unresolved
      - contradicted
    meanings:
      closed: Every segment and join required for the stated conclusion is closed under the stated conditions.
      partial: A physical route is supported but at least one required segment or join remains open.
      descriptive_only: The evidence closes a descriptive claim without closing a generating route.
      source_scale_only: The measured claim is supported at its source scale while translation to the requested scale remains open.
      proxy_limited: A measured proxy or correlate is supported while its translation to the claimed mechanism remains open.
      label_dependent: The surviving observation depends on pre-labeled groups and does not independently generate the grouping distinction.
      contested: Compatible evidence binds to the same segment under the same conditions and remains in unresolved conflict after review.
      unresolved: Available evidence does not assign another closure state to the required segment or join.
      contradicted: Evidence breaks the asserted segment or join under the stated conditions.
    missing_segment_rule: >
      Missing segments are recorded in unresolved_chain_slots and receive the unresolved closure state.
      Missing is a report category, not an additional closure state.
    contested_rule: >
      Contested is assigned only after segment identity, conditions, scale, independence, measurement,
      and translation limits have been checked and the conflict still survives.
    consumer_rule: Runtime and ingest consumers must reference this vocabulary and may not define additional closure states.

  confidence_propagation:
    rule: >
      Confidence attaches to the exact chain path required for a stated conclusion. A conclusion cannot
      exceed its weakest required segment or translation step. Missing segments outside that path do not
      cap a narrower conclusion.
    dimensions:
      - compilation
      - segment_closure
      - scale_translation
      - answer_translation
    global_single_score: forbidden

  guards:
    - no_magic_noun_as_operator
    - no_definition_sorting_in_place_of_generation
    - no_region_as_source_without_dependency_and_timing
    - no_conservation_as_weight_without_operation_and_route
    - no_statistical_significance_as_practical_significance
    - no_confidence_transfer_from_unrelated_closed_segments
    - no_mechanism_search_for_a_rejected_construct
    - no_evidence_laundry_list_to_rescue_folklore
    - no_causal_restating_of_heterogeneous_poorly_predictive_work
    - no_soft_causal_language_after_causal_rejection
