folk_behavior_extraction_gate:
  status: candidate
  layer: evidence_maintenance
  kernel_ref: model/kernel/folk_behavior_construct.yaml#folk_behavior_construct
  extends: model/ingest/rules.yaml#ingest_rules
  purpose: >
    Strip folk-behavior targets before design strength or intervention language can attach causal weight during paper ingest.

  phase: pre_admission
  runs_before:
    - design_admission
    - causal_admission
    - evidence_role_classification
    - body_weighting

  trigger: >
    Any source that names a familiar behavior, trait, disposition, faculty, deficit, or ecological target more broadly
    than its directly measured events and conditions.

  required_extraction:
    - source_folk_label
    - exact_exposure_or_assigned_protocol
    - exact_recorded_behavior_or_report
    - initiation_latency_or_temporal_relation
    - completion_or_termination_condition
    - task_and_environmental_conditions
    - incentive_cost_aversion_or_competing_transition_structure
    - researcher_contact_prompting_or_monitoring
    - observation_reporting_or_verification_operation
    - threshold_aggregation_or_classification_rule
    - tested_time_horizon
    - claimed_ecological_scope
    - construct_unity_evidence
    - transportability_evidence
    - unresolved_within_label_variation

  admission_rules:
    - source_label_enters_as_unadmitted_assertion
    - direct_measurements_are_preserved_at_their_measured_scope
    - folk_construct_begins_label_dependent
    - construct_level_causal_weight_remains_zero_without_independent_construct_escape
    - intervention_design_is_evaluated_only_for_the_exact_assigned_object_and_recorded_outcome
    - protocol_bound_behavior_does_not_become_real_world_effect_without_transport_evidence
    - mediation_between_reports_does_not_close_a_physical_or_behavioral_dependency

  required_relations_when_source_claims_efficacy:
    - assigned_protocol_to_exact_recorded_behavior
    - named_active_component_to_exact_recorded_behavior
    - intervention_to_folk_construct
    - intervention_to_claimed_real_world_scope
    - mediator_to_recorded_behavior_when_mediation_is_claimed
    - named_region_or_substrate_to_behavior_when_regional_mechanism_is_claimed

  relation_separation_rule: >
    Keep every relation separate. A surviving protocol-level contrast cannot raise the closure state of the folk
    construct, named active component, regional mechanism, mediator, or ecological transport relation.

  failure_routing:
    construct_level_target_without_escape:
      closure_state: label_dependent
      allowed_channels: [label_dependent_observation, descriptive_support, provenance_only]
      blocked_roles: [construct_validation, construct_level_causal_support, treatment_of_unitary_target]
    protocol_bound_measurement_without_transport:
      closure_state: source_scale_only
      allowed_channels: [descriptive_support, method_support, route_partial]
      blocked_roles: [real_world_effectiveness, ecological_generalization]
    mediator_without_intervention_or_physical_dependency:
      closure_state: proxy_limited
      allowed_channels: [proxy_only, descriptive_support, provenance_only]
      blocked_roles: [causal_mediation, mechanism, physical_carrier]

  forbidden_promotions:
    - significant_group_difference_to_reduced_folk_construct
    - large_effect_to_construct_identity
    - randomization_to_named_active_component_without_manipulation_identity
    - self_report_mediator_to_causal_carrier
    - daily_life_task_content_to_ecological_validity
    - familiar_term_to_admitted_target
