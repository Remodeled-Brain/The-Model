ingest_record_schema:
  status: candidate
  schema_version: v4
  layer: support_layer
  closure_vocabulary_ref: model/kernel/chain_contract.yaml#chain_contract.closure_vocabulary.states
  construct_admission_ref: model/kernel/chain_contract.yaml#chain_contract.construct_admission.dispositions
  causal_admission_ref: model/kernel/chain_contract.yaml#chain_contract.causal_claim_admission.dispositions
  evidence_admission_ref: model/kernel/evidence_admission.yaml#evidence_admission
  evidence_role_ref: model/runtime/evidence_binding_contract.yaml#evidence_binding_contract.evidence_role_classes
  support_channel_crosswalk_ref: model/ingest/failure_routing.yaml#ingest_failure_routing.closure_state_crosswalk

  identity:
    paper_id:
      required: true
      rule: Resolve canonical identity before writing a canonical record.
    identifiers:
      fields:
        - doi
        - pmid
        - arxiv
        - alternate_ids
    agent:
      required: true
      form: family/version
    run_id:
      required: true
      path_component: false
    timestamp:
      required: true

  source_ingress:
    required_fields:
      - source_claim_status
      - direct_observations
      - author_interpretations
      - sampling_and_grouping_operations
      - measurement_operations
      - analytical_transformations
      - stripped_assertions
    source_claim_status_default: unadmitted_assertion
    causal_weight_default: zero

  inference_audit:
    required: true
    bridge_status_enum:
      - unadmitted_assertion
      - observation_admitted
      - bridge_partially_closed
      - bridge_closed
      - causal_admitted
      - causal_rejected
      - non_probative
    per_bridge_required_fields:
      - bridge_id
      - source_statement
      - source_observation
      - target_claim
      - bridge_type
      - required_dependencies
      - direct_support
      - contrary_evidence
      - hidden_assumptions
      - shared_assumption_family
      - status
    output_fields:
      - admitted_observations
      - bridge_ledger
      - shared_assumption_families
      - non_probative_claims
      - strongest_surviving_claim
    rule: >
      A source conclusion cannot bind directly. Only admitted observations and bridges marked bridge_closed
      may contribute beyond their measured scope.

  extraction:
    required_fields:
      - measured_substrate
      - measured_variable
      - grouping_variable
      - explicit_observations
      - post_strip_claim
      - construct_disposition
      - causal_disposition
      - rejected_entity_claims
      - rejected_causal_claims
      - handle_dependencies
      - handle_flags
    construct_disposition_rule: Use exactly one disposition from construct_admission_ref for each questioned construct.
    causal_disposition_rule: Use exactly one disposition from causal_admission_ref for each hard causal claim.
    optional_fields:
      - source_scale
      - target_scale
      - state_transition
      - constraints

  validation:
    gate_results:
      required: true
      state_enum:
        - pass
        - fail
        - unresolved
        - not_applicable
      per_gate_required_fields:
        - gate
        - state
        - basis
        - support_channels
        - blocked_roles
        - unresolved_slots
    causal_test_results:
      required_when: source_claims_cause_defect_dysfunction_control_mechanism_or_biological_basis
      required_fields:
        - construct_coherence
        - temporal_direction
        - dependency_or_intervention
        - out_of_sample_prediction
        - baseline_and_comparator_performance
        - heterogeneity_control
        - practical_magnitude
        - scale_translation
        - independent_convergence
        - inferential_bridge_closure
        - disconfirmation_survival
      output_fields:
        - causal_disposition
        - failed_causal_tests
        - failed_inferential_bridges
        - passed_causal_tests
    evidence_role:
      required: true
      vocabulary_ref: model/runtime/evidence_binding_contract.yaml#evidence_binding_contract.evidence_role_classes
      required_fields:
        - evidence_role_class
        - role_target
        - non_probative_for
    chain_segments:
      required: true
      closure_state_rule: >
        Use exactly one kernel closure state. When the state derives from an ingest support channel,
        use support_channel_crosswalk_ref rather than assigning a second ingest-specific vocabulary.
      per_segment_fields:
        - segment_id
        - relation
        - closure_state
        - measured_scale
        - translation_limit

  body_weight_inputs:
    required_fields:
      - admission_status
      - claim_directness
      - construct_dependency
      - causal_disposition
      - causal_leverage
      - temporality
      - prediction_target
      - out_of_sample_performance
      - realistic_baseline
      - comparator_performance
      - condition_stability
      - heterogeneity_bound
      - scale_translation_status
      - effect_magnitude
      - variance_envelope
      - group_overlap
      - noise_floor
      - functional_threshold_relation
      - replication_status
      - independence_status
      - evidence_family_id
      - shared_assumption_family_id
      - disconfirmation_target
    rule: >
      These fields describe admission, chain contribution, causal admissibility, and family independence. They are
      not combined into a numerical quality score and cannot be overridden by publication count, prestige, peer
      review, consensus, recency, citation volume, or familiar causal wording.

  provenance:
    required_fields:
      - source_citation
      - source_location
      - extraction_method
      - corpus_mode
    independence_fields:
      - independence_status
      - evidence_family_id
      - shared_assumption_family_id
      - shared_pipeline_id
      - shared_cohort_id
      - shared_dataset_id
      - shared_model_lineage
      - shared_instrument_id
      - shared_task_id

  outputs:
    required_fields:
      - admitted_observations
      - stripped_assertions
      - bridge_ledger
      - shared_assumption_families
      - strongest_surviving_claim
      - support_channels
      - blocked_roles
      - translation_limits
      - construct_disposition
      - causal_disposition
      - failed_causal_tests
      - failed_inferential_bridges
      - evidence_role_class
      - non_probative_for
      - visibility_status
      - promotion_status
    promotion_status_enum:
      - none
      - candidate
      - blocked

  lifecycle:
    append_only: true
    supersedes:
      required: false
    current_record:
      generated: true
      hand_editable: false

  invariants:
    support_layer_only: true
    no_unilateral_claim_write: true
    source_conclusion_never_binds_directly: true
    causal_weight_defaults_to_zero: true
    peer_review_is_not_admission: true
    consensus_is_not_weight: true
    meta_analysis_does_not_repair_invalid_inputs: true
    repeated_bridge_is_not_independent_convergence: true
    recency_is_not_weight: true
    publication_count_is_not_weight: true
    identity_resolved_before_canonical_write: true
    unresolved_never_grants_closure: true
    rejected_construct_cannot_receive_entity_level_promotion: true
    causal_rejected_record_cannot_receive_causal_promotion: true
    heterogeneous_poorly_predictive_record_cannot_receive_causal_language: true
