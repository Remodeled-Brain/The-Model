ingest_record_schema:
  status: candidate
  schema_version: v6
  layer: support_layer
  closure_vocabulary_ref: model/kernel/chain_contract.yaml#chain_contract.closure_vocabulary.states
  construct_admission_ref: model/kernel/chain_contract.yaml#chain_contract.construct_admission.dispositions
  causal_admission_ref: model/kernel/chain_contract.yaml#chain_contract.causal_claim_admission.dispositions
  evidence_admission_ref: model/kernel/evidence_admission.yaml#evidence_admission
  presumption_ref: model/kernel/evidence_admission.yaml#evidence_admission.presumptive_classification
  evidence_role_ref: model/runtime/evidence_binding_contract.yaml#evidence_binding_contract.evidence_role_classes
  support_channel_crosswalk_ref: model/ingest/failure_routing.yaml#ingest_failure_routing.closure_state_crosswalk

  identity:
    paper_id:
      required: true
      rule: Resolve canonical identity before writing a canonical record.
    identifiers:
      fields: [doi, pmid, arxiv, alternate_ids]
    agent:
      required: true
      form: family/version
    run_id:
      required: true
    timestamp:
      required: true

  source_ingress:
    required_fields:
      - source_claim_status
      - direct_observations
      - author_interpretations
      - sampling_and_grouping_operations
      - measurement_operations
      - analytical_transformations
      - stripped_assertions
    source_claim_status_default: unadmitted_assertion
    causal_weight_default: zero

  evidence_axes:
    required: true
    required_fields:
      - design_mode
      - construct_relation
      - measurement_relation
      - target_relations
      - chain_exposure
    design_mode_enum:
      - observational
      - longitudinal_observational
      - natural_experiment
      - quasi_experimental
      - interventional
      - simulation_or_model
      - synthesis
    construct_relation_enum:
      - construct_independent
      - construct_indexed
      - construct_internal
    measurement_relation_enum:
      - direct_target_measurement
      - direct_dependency_measurement
      - proxy
      - surrogate
      - composite_or_scale
      - self_report
      - model_derived
    target_relation_enum:
      - descriptive_distribution
      - predictive_relation
      - intervention_to_outcome
      - endogenous_dependency
      - etiology_or_origin
      - mechanism_or_route
      - cross_scale_translation

  data_record:
    required: true
    required_fields:
      - exact_exposure_or_intervention
      - exact_outcome_definition
      - baseline_distribution
      - comparator_or_counterfactual
      - sample_and_exclusion_flow
      - effect_distribution
      - effect_magnitude
      - uncertainty
      - overlap_and_response_heterogeneity
      - missingness_attrition_and_crossover
      - timing_and_durability
      - dose_or_exposure_relation
      - adverse_or_opposing_outcomes
      - measurement_validity_and_noise
      - preregistration_and_outcome_switching
      - analysis_multiplicity
      - replication_and_condition_stability
    missing_value_rule: Record unavailable fields explicitly as missing. Never infer them from narrative adjectives.
    narrative_fit_fields:
      - claimed_effectiveness_scope
      - claimed_causal_scope
      - claimed_mechanism_scope
      - claimed_named_process
      - data_supported_scope
      - overstatement_or_bridge_gap

  presumption:
    required: true
    class_enum:
      - construct_indexed
      - proxy_or_surrogate
      - observational_record
      - intervention_record
      - direct_construct_independent
    required_fields:
      - presumptive_class
      - presumption_triggers
      - presumed_closure_state
      - presumed_support_role
      - initially_blocked_roles
      - escape_conditions_required
      - escape_conditions_tested
      - escape_conditions_passed
      - escape_complete
    default_rules:
      construct_indexed:
        closure_state: label_dependent
      proxy_or_surrogate:
        closure_state: proxy_limited
      observational_record:
        closure_state: descriptive_only
        causal_binding: denied_until_full_observational_burden_closes
      intervention_record:
        closure_state: unresolved
        eligible_causal_target: intervention_to_outcome
        broader_targets_require_separate_bridges: true
      direct_construct_independent:
        closure_state: unresolved
        causal_binding: denied_until_exact_data_bridges_and_segments_close
    upgrade_rule: >
      A stronger closure state may be written only for the exact target relation whose design, data, counterfactual,
      bridge, and segment requirements close. Missing requirements preserve the restrictive state for that relation.

  inference_audit:
    required: true
    bridge_status_enum:
      - unadmitted_assertion
      - observation_admitted
      - bridge_partially_closed
      - bridge_closed
      - causal_admitted
      - causal_rejected
      - non_probative
    per_bridge_required_fields:
      - bridge_id
      - source_statement
      - source_observation
      - target_claim
      - target_relation
      - bridge_type
      - required_dependencies
      - direct_support
      - contrary_evidence
      - hidden_assumptions
      - shared_assumption_family
      - status
    output_fields:
      - admitted_observations
      - bridge_ledger
      - shared_assumption_families
      - non_probative_claims
      - strongest_surviving_claim
    rule: Only admitted observations and closed bridges may contribute beyond their measured scope.

  extraction:
    required_fields:
      - measured_substrate
      - measured_variable
      - grouping_variable
      - explicit_observations
      - post_strip_claim
      - construct_disposition
      - causal_disposition_by_target
      - rejected_entity_claims
      - rejected_causal_claims
      - handle_dependencies
      - handle_flags
    optional_fields:
      - source_scale
      - target_scale
      - state_transition
      - constraints

  validation:
    gate_results:
      required: true
      state_enum: [pass, fail, unresolved, not_applicable]
      per_gate_required_fields:
        - gate
        - target_relation
        - state
        - basis
        - support_channels
        - blocked_roles
        - unresolved_slots
    causal_test_results:
      required_when: any_target_relation_is_causal
      required_fields:
        - target_relation_identity
        - design_supports_counterfactual
        - construct_coherence
        - temporal_direction
        - dependency_or_intervention_integrity
        - comparator_validity
        - effect_distribution_and_practical_magnitude
        - heterogeneity_and_condition_stability
        - durability
        - attrition_missingness_and_analysis_integrity
        - predictive_or_route_discriminating_adequacy
        - scale_translation
        - independent_convergence
        - inferential_bridge_closure
        - disconfirmation_survival
      output_fields:
        - causal_disposition_by_target
        - failed_causal_tests_by_target
        - failed_inferential_bridges_by_target
        - passed_causal_tests_by_target
    evidence_role:
      required: true
      vocabulary_ref: model/runtime/evidence_binding_contract.yaml#evidence_binding_contract.evidence_role_classes
      required_fields:
        - evidence_role_class
        - role_target
        - non_probative_for
    chain_segments:
      required: true
      per_segment_fields:
        - segment_id
        - relation
        - target_relation
        - presumed_closure_state
        - final_closure_state
        - upgrade_basis
        - measured_scale
        - translation_limit

  body_weight_inputs:
    required_fields:
      - design_mode
      - target_relation
      - presumptive_class
      - presumption_escape_status
      - admission_status
      - claim_directness
      - construct_dependency
      - causal_disposition
      - causal_leverage
      - counterfactual_validity
      - effect_distribution
      - effect_magnitude
      - realistic_baseline
      - comparator_performance
      - response_heterogeneity
      - condition_stability
      - durability
      - attrition_and_missingness
      - scale_translation_status
      - overlap
      - noise_floor
      - functional_threshold_relation
      - replication_status
      - independence_status
      - evidence_family_id
      - shared_assumption_family_id
      - disconfirmation_target
    rule: >
      These fields remain separate. They are not combined into a generic quality score and cannot be overridden by
      publication count, prestige, peer review, consensus, intervention naming, statistical significance, or narrative strength.

  provenance:
    required_fields:
      - source_citation
      - source_location
      - extraction_method
      - corpus_mode
    independence_fields:
      - independence_status
      - evidence_family_id
      - shared_assumption_family_id
      - shared_construct_id
      - shared_proxy_id
      - shared_intervention_id
      - shared_comparator_id
      - shared_outcome_measure_id
      - shared_pipeline_id
      - shared_cohort_id
      - shared_dataset_id
      - shared_model_lineage
      - shared_instrument_id
      - shared_task_id

  outputs:
    required_fields:
      - evidence_axes
      - presumptive_class
      - presumed_closure_state
      - data_fields_available
      - data_fields_missing
      - data_supported_scope
      - stripped_assertions
      - admitted_observations
      - bridge_ledger
      - shared_assumption_families
      - strongest_surviving_claim
      - eligible_causal_targets
      - support_channels
      - blocked_roles
      - translation_limits
      - construct_disposition
      - causal_disposition_by_target
      - failed_causal_tests_by_target
      - failed_inferential_bridges_by_target
      - evidence_role_class
      - non_probative_for
      - visibility_status
      - promotion_status
    promotion_status_enum: [none, candidate, blocked]

  lifecycle:
    append_only: true
    supersedes:
      required: false
    current_record:
      generated: true
      hand_editable: false

  invariants:
    support_layer_only: true
    no_unilateral_claim_write: true
    actual_data_outranks_source_narrative: true
    restrictive_presumption_assigned_before_local_checks: true
    observational_defaults_to_noncausal: true
    intervention_is_evaluated_for_exact_target_relation: true
    intervention_label_neither_grants_nor_denies_causality: true
    intervention_effect_does_not_automatically_establish_etiology_or_endogenous_mechanism: true
    statistical_significance_does_not_establish_effectiveness: true
    named_process_language_does_not_establish_measured_process: true
    source_conclusion_never_binds_directly: true
    causal_weight_defaults_to_zero: true
    peer_review_is_not_admission: true
    consensus_is_not_weight: true
    meta_analysis_does_not_repair_invalid_inputs: true
    repeated_bridge_is_not_independent_convergence: true
    recency_is_not_weight: true
    publication_count_is_not_weight: true
    identity_resolved_before_canonical_write: true
    unresolved_never_grants_closure: true
