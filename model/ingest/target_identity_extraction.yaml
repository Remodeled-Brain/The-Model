target_identity_extraction:
  status: candidate
  layer: evidence_maintenance
  kernel_ref: model/kernel/target_identity.yaml#target_identity
  extends: model/ingest/rules.yaml#ingest_rules
  purpose: >
    Extract the target actually generated by each source before design strength or author terminology can attach
    evidentiary weight to a shared name.

  phase: pre_admission
  runs_before:
    - design_admission
    - causal_admission
    - physical_extraction
    - evidence_role_classification
    - body_weighting

  required_extraction:
    - source_target_label
    - source_definition_or_identity_pointer
    - sample_selection_and_grouping_operations
    - exact_observations
    - exact_outcome_definition
    - measurement_or_reconstruction_operations
    - task_apparatus_and_environmental_conditions
    - timing_and_prior_state_conditions
    - aggregation_threshold_or_classification_rule
    - discarded_missing_or_unobserved_cases
    - inferred_target_after_measurement
    - claimed_broader_target
    - claimed_transport_scope
    - generator_type
    - generator_variables_and_inputs
    - boundary_conditions_and_regime
    - uncertainty_and_error_model
    - alternate_construction_sensitivity
    - operational_equivalence_evidence
    - identity_breaking_evidence
    - heterogeneity_generator_and_predictions
    - transportability_evidence
    - unresolved_identity_slots

  corpus_crosswalk:
    required_outputs:
      - same_label_operationalizations
      - different_labels_same_operationalization
      - cross_measure_prediction
      - intervention_transfer_across_measures
      - direction_magnitude_and_distribution_stability
      - measurement_invariance
      - condition_population_and_time_transport
      - shared_identity_generator_status
    rule: >
      Each operationalization enters as a separate target relation. Shared terminology cannot merge them. A shared
      target is written only when a recoverable generator and operational equivalence close across the claimed scope.

  source_claim_separation:
    required_relations_when_present:
      - exact_exposure_or_assigned_protocol_to_exact_recorded_outcome
      - named_active_component_to_exact_recorded_outcome
      - exact_measurement_to_constructed_target
      - constructed_target_to_claimed_broader_target
      - source_defined_target_to_speaker_or_field_level_target
      - protocol_bound_result_to_claimed_transport_scope
      - mediator_or_named_process_to_outcome
    rule: >
      Keep every relation separate. Closure of an exact recorded contrast cannot raise the identity, mechanism,
      portability, or construct-validity status of another relation.

  identity_admission:
    generated_identity_closed:
      eligible_roles: [route_closing, route_discriminating, segment_supporting, descriptive_only]
      rule: Bind only within the demonstrated generator and scope.
    generated_identity_conditional:
      eligible_roles: [route_closing, route_discriminating, segment_supporting, descriptive_only]
      rule: Attach model, apparatus, task, population, regime, and construction conditions to every use.
    constructed_measurement_identity:
      eligible_roles: [segment_supporting, descriptive_only]
      blocked_roles: [natural_kind_validation, broader_construct_causality_without_escape]
    grouping_handle_only:
      closure_state: label_dependent
      eligible_roles: [descriptive_only, premise_breaking, non_probative]
      blocked_roles: [construct_validation, unitary_target_causality, common_mechanism_by_name]
    identity_unresolved:
      closure_state: unresolved
      eligible_roles: [descriptive_only, route_discriminating, non_probative]
    premise_rejected:
      closure_state: contradicted
      eligible_roles: [premise_breaking, descriptive_only, non_probative]

  heterogeneity_audit:
    hostile_questions:
      - Which variables generate the observed differences within the shared name?
      - Does the proposed generator predict the direction and distribution of those differences?
      - Do alternate tasks instruments thresholds or populations preserve the same target relation?
      - Does intervention response transfer across operationalizations?
      - Which divergences are renamed complexity multidimensionality presentation task impurity or context dependence?
    failure_rule: >
      Heterogeneity language without generated differentiators is identity-breaking evidence. It cannot protect a
      unitary target or be averaged into a generic confidence score.

  randomization_and_design_rule: >
    Randomization and comparison apply only to the assigned object and recorded outcome. They cannot establish
    target identity, isolate an unmeasured active component, validate a category, or transport a protocol-bound result.

  preservation_rule: >
    Preserve exact observations and constructed measures when shared identity fails. Route them to descriptive,
    label-dependent, constructed-measurement, method, disconfirmation, route-partial, or provenance channels rather
    than discarding the source.

  forbidden_promotions:
    - repeated_name_to_shared_identity
    - validated_scale_to_natural_kind
    - factor_or_cluster_to_physical_entity
    - randomization_to_construct_validity
    - large_effect_to_target_identity
    - heterogeneous_presentation_to_common_generator
    - protocol_bound_measurement_to_general_real_world_target
    - definition_by_synonym_to_recoverable_generator
