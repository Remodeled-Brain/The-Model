ingest_architecture:
  status: candidate
  layer: evidence_maintenance
  purpose: >
    Convert a source into a provenance-bound relation-level record whose admissible scope is generated from the
    actual data, design, construct dependence, measurement distance, and exposed chain rather than the source narrative.

  evidence_admission_ref: model/kernel/evidence_admission.yaml#evidence_admission

  boundary:
    consumes: paper_or_source
    emits: audited_support_record
    cannot:
      - define_the_source_question
      - alter_the_chain_kernel
      - determine_the_final_answer_shape
      - write_canonical_claim_state_without_adoption
      - treat_source_conclusions_as_admitted_evidence

  phase_0_data_and_design:
    purpose: Extract the actual observations and classify what causal contrast the design can expose.
    required_outputs:
      - design_mode
      - construct_relation
      - measurement_relation
      - target_relations
      - chain_exposure
      - exact_exposure_or_intervention
      - exact_outcome_definition
      - comparator_or_counterfactual
      - full_effect_distribution
      - effect_magnitude
      - response_heterogeneity
      - timing_and_durability
      - sample_flow_attrition_and_missingness
      - measurement_validity_and_noise
      - analysis_integrity
    rules:
      - The actual data outrank the abstract discussion and conclusion.
      - Observational work begins descriptive or more restricted.
      - Intervention work begins unresolved and may earn causality for the exact manipulated relation.
      - Intervention naming neither grants nor denies causality.
      - Construct dependence and proxy distance remain separate restrictions.

  phase_A_presumption_and_audit:
    purpose: Assign the most restrictive applicable initial state and expose every inferential bridge.
    required_outputs:
      - presumptive_class
      - presumed_closure_state
      - presumed_support_role
      - initially_blocked_roles
      - admitted_observations
      - stripped_assertions
      - bridge_ledger
      - shared_assumption_families
    routing:
      construct_indexed: label_dependent
      proxy_or_surrogate: proxy_limited
      observational_record: descriptive_only
      intervention_record: unresolved
      direct_construct_independent: unresolved
    rules:
      - Missing evidence preserves the restrictive state for the affected relation.
      - One local pass cannot upgrade the whole record.
      - Every increase from observation to cause mechanism effectiveness or named process requires a bridge.

  phase_B_relation_validation:
    purpose: Test each target relation using the burden appropriate to its design and claimed scope.
    gates:
      - construct_admission
      - counterfactual_integrity
      - manipulation_or_exposure_integrity
      - temporality
      - practical_significance
      - response_distribution_and_heterogeneity
      - durability
      - attrition_missingness_and_analysis_integrity
      - prediction_or_route_discrimination_when_required
      - proxy_translation
      - scale_translation
      - independence
      - disconfirmation
    outputs:
      - data_supported_scope
      - eligible_causal_targets
      - causal_disposition_by_target
      - failed_causal_tests_by_target
      - failed_inferential_bridges_by_target
      - final_closure_state_by_target
      - support_channels
      - blocked_roles

  phase_C_binding_eligibility:
    purpose: Determine which exact relations the audited record may support.
    rules:
      - Bind only admitted observations and closed bridges.
      - Observational evidence remains descriptive unless the full causal burden closes.
      - A passing intervention may bind intervention_to_outcome causally under tested conditions.
      - Intervention effects do not automatically establish etiology endogenous mechanism construct validity or cross-scale explanation.
      - Proxy relations remain proxy_limited until physical translation closes.
      - Construct-indexed relations remain label_dependent until construct escape closes.
      - Narrative strength cannot exceed data-supported scope.
    outputs:
      - eligible_binding_relations
      - forbidden_binding_relations
      - evidence_role_class
      - non_probative_for

  write_boundary:
    allowed:
      - evidence_axes
      - data_record
      - presumptive_classification
      - admitted_observations
      - stripped_assertions
      - bridge_ledger
      - shared_assumption_families
      - relation_level_gate_results
      - evidence
      - provenance
      - extraction_notes
      - disconfirmation_notes
      - method_notes
      - missing_route_notes
      - promotion_candidates
      - promotion_gate_results
    canonical_integration: serialized_explicit_adoption_only

  recency:
    search_priority: true
    supersession_review_priority: true
    causal_weight: false
    presumption_escape: false

  invariants:
    phase_0_before_phase_A_before_phase_B_before_phase_C: true
    actual_data_outranks_source_narrative: true
    observational_defaults_to_noncausal: true
    intervention_is_evaluated_for_exact_target_relation: true
    intervention_label_neither_grants_nor_denies_causality: true
    treatment_effect_does_not_automatically_establish_etiology_or_endogenous_mechanism: true
    construct_indexed_defaults_to_label_dependent: true
    proxy_defaults_to_proxy_limited: true
    analytical_significance_cannot_supply_effectiveness: true
    named_process_language_cannot_supply_measured_process: true
    failed_gate_preserves_restrictive_state_for_affected_relation: true
    support_note_count_cannot_create_grounding: true
