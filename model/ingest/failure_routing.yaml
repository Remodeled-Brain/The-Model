ingest_failure_routing:
  status: candidate
  layer: evidence_maintenance
  purpose: Preserve useful observations while applying restrictive evidence presumptions before any support upgrade.

  closure_vocabulary_ref: model/kernel/chain_contract.yaml#chain_contract.closure_vocabulary.states
  evidence_admission_ref: model/kernel/evidence_admission.yaml#evidence_admission.presumptive_classification

  default:
    source_record: keep
    provenance: keep
    support_notes: keep
    direct_grounding: deny
    causal_weight: zero
    promotion: deny_until_presumption_escape_and_required_gates_pass

  support_channels:
    - mechanistic_grounded
    - route_partial
    - source_scale_only
    - proxy_only
    - descriptive_support
    - label_dependent_observation
    - method_support
    - disconfirmation
    - provenance_only

  channel_meanings:
    mechanistic_grounded: Required construct-independent route and translation segments are closed for the claimed scope.
    route_partial: A construct-independent physical route survives but one or more required dependency segments remain open.
    source_scale_only: The measurement is valid at its measured scale but translation to the requested scale is open.
    proxy_only: The measured variable is a proxy, correlate, classifier, surrogate, or downstream readout and cannot bind causally.
    descriptive_support: A sound descriptive intervention-outcome, epidemiological, phenomenological, association, or first-report claim.
    label_dependent_observation: The observation survives only as a relation among construct-selected or pre-labeled groups.
    method_support: The source constrains measurement, assay, perturbation, or analysis behavior without closing the target segment.
    disconfirmation: The source breaks an asserted construct, bridge, segment, prediction, or route.
    provenance_only: The source remains in the record without a support role.

  closure_state_crosswalk:
    vocabulary_ref: model/kernel/chain_contract.yaml#chain_contract.closure_vocabulary.states
    channels:
      mechanistic_grounded: closed
      route_partial: partial
      source_scale_only: source_scale_only
      proxy_only: proxy_limited
      descriptive_support: descriptive_only
      label_dependent_observation: label_dependent
      method_support: unresolved
      disconfirmation: contradicted
      provenance_only: unresolved
    rule: >
      Support channels describe the evidentiary role retained by an ingest record. When a channel is
      bound to a chain segment, its closure state must come from this crosswalk and the kernel-owned
      closure vocabulary. Contested is assigned by the evidence binder after cross-record conflict review,
      not by a single ingest record.

  presumption_routing:
    construct_indexed:
      initial_channel: label_dependent_observation
      initial_closure_state: label_dependent
      causal_binding: forbidden
      upgrade_requires:
        - every_construct_escape_condition_passed
        - exact_bridge_closed
        - exact_chain_segment_closed
        - construct_independent_replication
      missing_escape_evidence: preserve_initial_classification
    proxy_record:
      initial_channel: proxy_only
      initial_closure_state: proxy_limited
      causal_binding: forbidden
      mechanism_binding: forbidden
      upgrade_rule: >
        Proxy records do not upgrade into causal evidence. A distinct direct-dependency record must be created
        and evaluated independently.
    treatment_response:
      initial_channel: descriptive_support
      initial_closure_state: descriptive_only
      secondary_channel_when_label_selected: label_dependent_observation
      may_bind:
        - intervention_to_measured_outcome
        - adverse_effect
        - dose_timing_response_distribution
      may_not_bind:
        - etiology
        - pathogenesis
        - diagnostic_construct_validity
        - endogenous_mechanism
        - defect_or_dysfunction
        - biological_basis
    direct_construct_independent:
      initial_channel: provenance_only
      initial_closure_state: unresolved
      causal_binding: denied_until_all_required_bridges_and_segments_close

  gate_intersection:
    notes: union
    permissions: intersection
    presumption_survives_local_passes: true
    rule: >
      Every applicable gate contributes its support channel, translation limit, and blocked role. A local pass
      cannot erase a restrictive presumption. Upgrade occurs only after every applicable escape condition and
      every required bridge and segment closes. Unresolved never grants closure.

  aggregation:
    rule: >
      Support-only records never become grounding by raw count. Correlated records and records sharing a construct,
      cohort, dataset, pipeline, task, instrument, proxy, or inferential bridge count as one family for weighting.
    count_can_raise_visibility: true
    count_can_create_grounding: false
    count_can_escape_presumption: false
    independence_required_for_accumulation: true

  hard_zero_scope:
    rule: Hard zero applies to a claimed role, never to the source itself.
    construct_indexed_without_escape:
      zeroes:
        - causal_binding
        - mechanism_binding
        - etiologic_binding
        - construct_validation
      preserves:
        - label_dependent_observation
        - descriptive_support
        - provenance
    treatment_response:
      zeroes:
        - etiology
        - pathogenesis
        - endogenous_mechanism
        - diagnostic_construct_validity
        - biological_basis
      preserves:
        - intervention_outcome_relation
        - adverse_effect_relation
        - dose_timing_response_distribution
        - provenance
    postdictive_claim:
      zeroes:
        - prediction_weight
        - direct_generative_grounding
      preserves:
        - descriptive_support
        - provenance
        - method_support
    no_surviving_claim:
      zeroes:
        - mechanism_mapping
        - promotion
      preserves:
        - category_failure_note
        - provenance
    proxy_without_translation:
      zeroes:
        - direct_mechanism_binding
        - causal_binding
      preserves:
        - proxy_only
        - assay_observation
        - translation_limit
    region_without_source_closure:
      zeroes:
        - origin_weight
      preserves:
        - implementation_site_observation
        - perturbation_leverage_note

  output_required:
    - presumptive_class
    - presumed_closure_state
    - presumption_basis
    - escape_conditions_tested
    - escape_conditions_passed
    - support_channels
    - closure_state
    - blocked_roles
    - translation_limits
    - unresolved_slots
    - preserved_observations
