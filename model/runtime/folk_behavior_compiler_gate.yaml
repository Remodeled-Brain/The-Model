folk_behavior_compiler_gate:
  status: candidate
  layer: primary_runtime
  kernel_ref: model/kernel/folk_behavior_construct.yaml#folk_behavior_construct
  extends: model/runtime/question_compiler.yaml#question_compiler
  purpose: >
    Make folk-behavior translation a mandatory compiler operation before evidence retrieval or causal review.

  insertion_point:
    after: detect_handles_and_hidden_operators
    before: evaluate_construct_admission

  required_sequence:
    - detect_folk_behavior_handles
    - remove_label_supplied_outcome_identity
    - extract_explicit_measured_events_timings_conditions_and_measurement_operations
    - emit_construct_reconstruction_record
    - assign_construct_disposition
    - reject_construct_level_causal_target_when_unescaped
    - continue_only_with_independently_measurable_target_relations

  required_output:
    construct_reconstruction:
      per_handle_fields:
        - source_label
        - handle_categories
        - construct_disposition
        - independently_measured_observations
        - overt_event_or_transition
        - initiation_latency_or_temporal_relation
        - completion_or_termination_condition
        - task_and_environmental_conditions
        - incentive_cost_aversion_or_competing_transition_structure
        - observation_or_reporting_operation
        - threshold_aggregation_or_classification_rule
        - tested_time_horizon
        - tested_population_and_context
        - claimed_ecological_scope
        - unresolved_sources_of_within_label_variation
        - rejected_construct_level_targets
        - surviving_exact_target_relations

  routing:
    no_independent_observation_survives:
      construct_disposition: premise_rejected
      causal_disposition: causal_rejected
      action: stop_construct_level_evidence_search
    independent_measurement_survives:
      construct_disposition: grouping_handle_only
      action: continue_with_each_exact_measurement_relation_separately
    construct_unity_independently_demonstrated:
      construct_disposition: admitted
      action: continue_only_at_the_demonstrated_operational_and_ecological_scope

  exact_target_rule: >
    A randomized or otherwise strong design may be evaluated for the exact assigned protocol to exact recorded
    behavior relation. It cannot use that result to restore the removed folk target. The compiler must emit both
    relations separately whenever the source claims construct-level efficacy.

  answer_target_rule: >
    The answer target must name the measured event, timing, conditions, and measurement operation. The folk label
    may appear only as a source term or grouping handle accompanied by the reconstruction and scope limit.

  forbidden_compilations:
    - procrastination_as_one_outcome_without_decomposition
    - motivation_as_a_physical_state_by_name
    - self_control_as_an_internal_operator
    - task_outcome_value_as_a_causal_carrier_by_statistical_mediation
    - ordinary_life_task_as_real_world_transport
    - intervention_effect_on_measurement_rewritten_as_treatment_of_the_folk_construct
