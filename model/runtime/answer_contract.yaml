answer_contract:
  status: candidate
  layer: primary_runtime
  purpose: >
    Produce a responsive answer that rejects invalid premises and failed causal propositions before evidence
    accommodation, follows only admitted chain paths, and reports the weighted body of evidence without laundering
    heterogeneous or poorly predictive work into causal language.

  closure_vocabulary_ref: model/kernel/chain_contract.yaml#chain_contract.closure_vocabulary.states
  construct_admission_ref: model/kernel/chain_contract.yaml#chain_contract.construct_admission.dispositions
  causal_admission_ref: model/kernel/chain_contract.yaml#chain_contract.causal_claim_admission.dispositions
  body_verdict_ref: model/runtime/evidence_binding_contract.yaml#evidence_binding_contract.body_of_evidence_assessment.body_verdicts

  required_inputs:
    - source_question
    - question_type
    - hard_causality_request
    - construct_disposition
    - causal_disposition
    - causal_failure_basis
    - rejected_premises
    - answer_target
    - compiled_questions
    - answerability_status
    - evidence_bindings
    - body_of_evidence_verdict
    - body_of_evidence_basis
    - excluded_or_capped_records
    - per_segment_closure
    - chain_join_status
    - unresolved_chain_slots
    - narrower_answerable_targets

  answer_precedence:
    causal_rejected:
      - state_no_or_the_direct_causal_rejection_in_the_first_sentence
      - identify_the_failed_construct_or_causal_premise
      - name_the_load_bearing_failure_path
      - do_not_restate_descriptive_associations_in_causal_feeling_language
      - stop_unless_descriptive_context_is_needed_to_explain_the_failure
    premise_rejected:
      - state_the_rejection_in_the_first_sentence
      - identify_the_label_or_region_story_that_supplied_false_entity_or_defect_status
      - explain_the_premise_failure_without_surveying_accommodating_associations
      - state_any_explicit_observation_that_survives
      - stop_unless_the_user_asks_for_a_replacement_empirical_question
    admitted_or_underspecified:
      - state_the_best_supported_answer_at_the_requested_or_narrower_valid_scope
      - generate_the_required_physical_path
      - identify_the_operations_and_state_transition

  answer_sequence:
    - apply_construct_and_causal_dispositions_before_evidence_summary
    - state_the_direct_answer
    - report_the_body_of_evidence_verdict_and_its_load_bearing_basis
    - exclude_non_probative_records_from_the_support_narrative
    - report_segment_and_join_closure_using_the_kernel_vocabulary
    - report_unresolved_chain_slots_separately
    - preserve_alternative_routes_until_discriminated
    - distinguish_observation_readout_implementation_route_and_source
    - translate_back_to_source_language_without_restoring_handles_or_failed_causal_relations
    - state_confidence_for_each_claimed_conclusion

  premise_rejection_rule: >
    A rejected construct is not answered with a balanced literature review. Records that presuppose the rejected
    entity may be mentioned only to explain why they are non-probative. The answer may not rescue the premise by
    substituting a familiar trait bundle, deficit story, or nearby regional association.

  causal_rejection_rule: >
    A hard causality question with causal_rejected is answered as a failed causal proposition. Heterogeneous,
    unstable, overlapping, postdictive, weakly predictive, proxy-limited, or label-selected findings remain
    descriptive failures of causal admission. They may not be restated as contributions, roles, bases,
    dysfunctions, deficits, mechanisms, underpinnings, mediation, or partial causes.

  causal_language_gate:
    allowed_only_when: causal_disposition_is_causal_admitted
    forbidden_after_causal_rejection:
      - causes
      - contributes_to
      - plays_a_role_in
      - underlies
      - is_involved_in
      - mediates
      - drives
      - is_the_basis_of
      - reflects_dysfunction
      - reflects_impairment
      - partly_explains
      - may_help_explain
      - is_consistent_with_a_causal_role
    association_context_rule: >
      Association findings may be named only as non-causal observations needed to explain why the causal claim
      fails. Do not provide an association catalogue after the failure path is already established.

  evidence_summary_rule: >
    Summarize the body of evidence by independent evidence family and chain contribution. Lead with premise-breaking,
    route-closing, route-discriminating, and disconfirming evidence. Do not present a paper count, citation parade,
    undifferentiated list of associations, or heterogeneous descriptive work as balance.

  conclusion_record:
    required_fields:
      - conclusion
      - construct_disposition
      - causal_disposition
      - required_chain_path
      - supporting_bindings
      - excluded_or_capped_bindings
      - body_of_evidence_verdict
      - closure_state
      - translation_steps
      - unresolved_limits
      - confidence
    closure_state_rule: Use exactly one state from closure_vocabulary_ref.
    causal_disposition_rule: Use exactly one disposition from causal_admission_ref.
    body_verdict_rule: Use exactly one verdict from body_verdict_ref.

  confidence_dimensions:
    compilation:
      basis: security_of_source_to_physical_mapping
    segment_closure:
      basis: evidence_for_each_required_segment_and_join
    scale_translation:
      basis: demonstrated_dependency_across_required_scales
    answer_translation:
      basis: distance_from_the_closed_chain_to_the_source_wording

  confidence_rule: >
    Confidence is conclusion-specific. A conclusion cannot exceed the weakest segment or translation
    step on its required path. Open segments outside that path do not cap a narrower conclusion.

  rules:
    - Never collapse confidence into one score.
    - A causal-rejected answer must not be softened into mixed, complex, multifactorial, linked, associated, or may-contribute framing.
    - A premise-rejected answer may reuse the user's label only to name the rejected folklore handle.
    - A grouping handle cannot be translated back as a biological entity.
    - Missing evidence must be named as an unresolved segment, join, dependency, measurement, discriminator, or translation step.
    - Multiple surviving routes remain explicit until evidence distinguishes their generated consequences.
    - A descriptive answer is complete when the question is descriptive and the measurements support it.
    - A partial answer states the narrower answer target it actually closes.
    - Conflicting evidence uses the contested kernel state only after the kernel conflict checks are complete.
    - Conventional terminology cannot fill an unresolved route.
    - A necessary premise or causal-test failure outranks any volume of downstream literature that assumes it.
    - Label-dependent, proxy-limited, source-scale-only, postdictive, heterogeneous, poorly predictive, or practically trivial evidence cannot be narrated as mechanism support.

  output_schema:
    direct_answer: string
    answer_scope: string
    construct_disposition:
      vocabulary_ref: model/kernel/chain_contract.yaml#chain_contract.construct_admission.dispositions
      value: string
    causal_disposition:
      vocabulary_ref: model/kernel/chain_contract.yaml#chain_contract.causal_claim_admission.dispositions
      value: string
    causal_failure_path: list
    rejected_premises: list
    body_of_evidence:
      verdict:
        vocabulary_ref: model/runtime/evidence_binding_contract.yaml#evidence_binding_contract.body_of_evidence_assessment.body_verdicts
        value: string
      load_bearing_evidence_families: list
      strongest_disconfirmation: list
      excluded_or_capped_families: list
      basis: list
    generated_chain: list
    operations: list
    state_transition: string
    closure_report:
      vocabulary_ref: model/kernel/chain_contract.yaml#chain_contract.closure_vocabulary.states
      per_segment: map
      per_join: map
      by_state: map
      unresolved_chain_slots: list
    alternative_routes: list
    translation_back: string
    conclusions: list
    confidence:
      compilation: map
      segment_closure: map
      scale_translation: map
      answer_translation: map

  forbidden_patterns:
    - definition_sorting_as_primary_explanation
    - label_reintroduced_as_operator
    - diagnostic_label_reintroduced_as_biological_entity
    - charitable_rewrite_that_rescues_a_rejected_premise
    - causal_question_answered_with_association_language
    - heterogeneous_poorly_predictive_work_rephrased_as_causal
    - soft_causal_language_after_causal_rejection
    - literature_laundry_list_after_premise_rejection
    - citation_volume_as_confidence
    - weak_association_presented_as_balance_against_premise_failure
    - recency_as_causal_weight
    - hidden_single_score
    - certainty_beyond_required_path_closure
    - unresolved_full_scope_presented_as_a_closed_answer
    - closure_state_defined_outside_the_kernel
