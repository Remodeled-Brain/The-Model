answerability_planner:
  status: candidate
  layer: primary_runtime
  purpose: >
    Determine what empirical work is required for admitted questions, which chain segments are available,
    and when the source premise must be rejected without opening a mechanism search.

  construct_admission_ref: model/kernel/chain_contract.yaml#chain_contract.construct_admission.dispositions

  input_required:
    - question_type
    - construct_disposition
    - rejected_premises
    - answer_target
    - compiled_questions
    - candidate_dependency_paths
    - physical_variables
    - candidate_substrates
    - candidate_operations
    - state_transition
    - required_scale_translations
    - required_chain_slots

  admission_routing:
    premise_rejected:
      plan:
        - state_the_premise_failure
        - identify_the_handle_that_supplied_false_entity_or_defect_status
        - prevent_entity_level_mechanism_retrieval
        - preserve_only_explicit_observations_if_any
      evidence_allowed:
        - evidence_testing_construct_coherence
        - evidence_disconfirming_the_entity_or_defect_premise
        - descriptive_context_explicitly_requested_by_the_user
      evidence_forbidden:
        - papers_that_presuppose_the_rejected_entity_as_support_for_its_mechanism
        - literature_search_for_a_more_charitable_surrogate_question
      output_status: premise_rejected
    grouping_handle_only:
      plan:
        - retain_label_only_as_grouping_metadata
        - require_independently_measured_variables_for_any_physical_question
    admitted:
      plan:
        - continue_to_chain_planning
    underspecified:
      plan:
        - name_the_missing_measurement_or_relation
        - do_not_fill_it_from_conventional_definitions

  planning_dimensions:
    measurement:
      asks:
        - Which variables must be directly measured?
        - At what scale, resolution, time, and condition?
        - Does the measurement observe the claimed operation or only a readout?
    perturbation:
      asks:
        - Which dependency can be altered without making the result uninterpretable?
        - What outcome distinguishes source, route, implementation, and readout?
        - Could compensation or redundancy hide the dependency?
    temporality:
      asks:
        - What must precede what?
        - Is the evidence predictive, prospective, concurrent, retrospective, or postdictive?
        - Does the measured interval match the claimed operation?
    translation:
      asks:
        - Which physical steps carry the measured change across scales?
        - Which step is inferred from shared language rather than demonstrated dependency?
        - What narrower source-scale conclusion survives if translation remains open?
    controlled_difference:
      asks:
        - What variable must differ when nominal inputs are held constant?
        - What candidate route generates each divergent outcome?
    organism_state:
      asks:
        - Which reachable or stabilizable state transition is at issue?
        - Which operation changes availability, weighting, stabilization, blocking, release, maintenance, or switching?
        - Which constraints define a successful transition?
    route_discrimination:
      asks:
        - What do the surviving routes predict differently?
        - Which measurement or perturbation separates those predictions?
        - Which result would reopen a currently closed segment?

  segment_closure_requirements:
    observation:
      - measurement_matches_variable
      - scope_and_condition_are_stated
    dependency:
      - direction_is_supported
      - timing_is_compatible
      - competing_explanations_are_bounded
    intervention:
      - perturbation_changes_the_required_relation
      - interpretation_survives_systemic_collapse_and_compensation_checks
    scale_translation:
      - carried_variable_is_identified
      - intermediate_dependencies_are_explicit
      - source_and_target_conditions_are_compatible
    route_discrimination:
      - candidate_routes_generate_distinct_predictions
      - a_discriminating_observation_favors_or_breaks_a_route

  output_schema:
    construct_disposition:
      vocabulary_ref: model/kernel/chain_contract.yaml#chain_contract.construct_admission.dispositions
      value: string
    premise_rejection_basis: list
    per_compiled_question:
      - required_measurements
      - required_perturbations
      - required_temporality
      - required_dependency_closure
      - required_translation_steps
      - compensation_or_redundancy_checks
      - discriminating_observations
      - available_chain_segments
      - missing_chain_segments
      - incompatible_evidence
      - narrower_answerable_targets
    answerability_status:
      state: [premise_rejected, answerable, partially_answerable, descriptive_only, currently_unanswerable]
      basis: list

  rules:
    - Premise rejection precedes and terminates mechanism planning for the rejected entity.
    - A rejected diagnostic construct cannot be rescued by substituting traits, deficits, or region associations not stated in the question.
    - A missing route produces an explicit research requirement only for an admitted observation.
    - Partial closure permits conclusions that use only the closed path.
    - Missing segments outside a narrower conclusion do not cap that conclusion.
    - Descriptive evidence may fully answer a descriptive question.
    - A question may compile successfully when the current corpus cannot answer it.
    - Recency affects search and supersession review, never causal weight.
    - Multiple routes remain open until a discriminating observation breaks or favors one.
