answerability_planner:
  status: candidate
  layer: primary_runtime
  purpose: >
    Determine what empirical work is required for each admitted target relation. Apply relation-specific causal
    admission rather than one universal causal checklist.

  construct_admission_ref: model/kernel/chain_contract.yaml#chain_contract.construct_admission.dispositions
  causal_admission_ref: model/kernel/chain_contract.yaml#chain_contract.causal_claim_admission.dispositions
  evidence_admission_ref: model/kernel/evidence_admission.yaml#evidence_admission

  input_required:
    - question_type
    - hard_causality_request
    - construct_disposition
    - rejected_premises
    - answer_target
    - target_relations
    - candidate_dependency_paths
    - physical_variables
    - candidate_substrates
    - candidate_operations
    - state_transition
    - required_scale_translations
    - required_chain_slots

  admission_routing:
    premise_rejected:
      - state_the_premise_failure
      - assign_causal_rejected_to_targets_that_require_the_failed_construct
      - stop_entity_level_mechanism_retrieval
      - preserve_only_explicit_observations
    grouping_handle_only:
      - retain_label_as_grouping_metadata
      - require_independently_measured_variables_for_physical_claims
      - reject_unitary_causal_claims_about_the_grouping_handle
    admitted:
      - continue_to_relation_specific_planning
    underspecified:
      - name_the_missing_measurement_or_relation
      - do_not_fill_it_from_conventional_definitions

  target_relation_plans:
    descriptive_distribution:
      required:
        - valid_measurement
        - stated_population_condition_and_time
        - sampling_and_missingness_bounded
      causal_disposition: not_a_causal_question
    observational_causal_relation:
      required:
        - construct_independent_target
        - temporal_direction
        - alternative_routes_and_confounding_paths_tested
        - negative_controls_or_equivalent_failure_probes
        - practical_effect_magnitude
        - bounded_heterogeneity_and_condition_stability
        - independent_operationalizations
        - prediction_when_the_claim_entails_prediction
        - every_claimed_mechanism_and_scale_bridge_closed
      default_without_full_closure: descriptive_only
    intervention_to_outcome:
      required:
        - manipulation_integrity
        - valid_comparator_or_counterfactual
        - temporal_precedence
        - direct_or_validly_translated_outcome_measurement
        - full_effect_and_response_distribution
        - practical_magnitude
        - bounded_or_generated_heterogeneity
        - specificity_against_relevant_alternative_routes
        - durability_matching_claim
        - bounded_attrition_missingness_crossover_and_adverse_outcomes
        - replication_or_internal_strength_proportionate_to_scope
        - survival_of_disconfirmation
      prediction_required_only_when:
        - claim_generalizes_beyond_tested_conditions
        - route_identity_entails_distinct_predictions
        - future_or_individual_state_prediction_is_claimed
      pass_result: causal_admitted_for_intervention_to_outcome
    endogenous_dependency:
      required:
        - direct_dependency_or_intervention_evidence_on_the_route
        - route_position_direction_and_timing
        - compensation_and_redundancy_checks
        - route_discrimination
        - condition_stability
        - relevant_prediction_when_route_identity_entails_it
    etiology_or_origin:
      required:
        - source_precedes_generated_outcome
        - endogenous_route_from_source_to_outcome
        - alternative_origins_discriminated
        - intervention_response_not_used_as_origin_without_additional_route
    mechanism_or_route:
      required:
        - explicit_substrate_variable_operation_and_carrier
        - every_segment_and_join_closed
        - source_implementation_and_readout_roles_discriminated
        - competing_routes_bounded
    cross_scale_translation:
      required:
        - source_and_target_scales
        - carried_variable
        - intermediate_dependencies
        - temporal_and_condition_compatibility

  data_requirements:
    universal:
      - exact_outcome_definition
      - baseline_distribution
      - comparator_or_counterfactual
      - full_effect_distribution
      - effect_magnitude_and_uncertainty
      - overlap_and_response_heterogeneity
      - sample_flow_attrition_and_missingness
      - timing_and_durability
      - adverse_or_opposing_outcomes
      - measurement_validity_and_noise
      - analysis_integrity
    rule: Missing data remain missing and cannot be replaced by source adjectives or design labels.

  hard_failure_results:
    rejected_construct: causal_rejected_for_dependent_targets
    invalid_counterfactual: causal_rejected_for_claimed_effect
    narrative_exceeds_data: causal_rejected_for_excess_scope
    heterogeneous_unbounded_effects: causal_rejected_for_unitary_claim
    poor_prediction_when_prediction_is_entailed: causal_rejected_for_predictive_or_generalized_claim
    postdictive_only_body: causal_rejected_for_prediction_and_direction
    small_overlapping_average_difference: causal_rejected_for_defect_or_individual_state_claim
    failed_scale_translation: causal_rejected_for_requested_cross_scale_claim
    missing_route_without_positive_failure: causal_unresolved

  planning_dimensions:
    measurement:
      - Which variables were directly measured?
      - Does the measurement observe the target or a proxy composite or readout?
      - What noise threshold and scale limit apply?
    counterfactual:
      - What comparison supports the claimed contrast?
      - Does it isolate the named exposure or intervention?
      - Which alternative routes remain compatible?
    effect_distribution:
      - What is the full response distribution?
      - Is the effect practically large relative to variance overlap noise and threshold?
      - Are nonresponse worsening and adverse outcomes included?
    temporality_and_durability:
      - What precedes what?
      - How long does the measured change persist?
      - Does the time horizon match the claim?
    heterogeneity:
      - Is variation generated by explicit conditions or routes?
      - Are direction magnitude and response stable enough for the requested scope?
    translation:
      - Which physical dependencies carry the result across each claimed scale?
      - What narrower source-side conclusion survives an open bridge?
    route_discrimination:
      - What do surviving routes predict differently?
      - Which measurement or manipulation separates them?

  output_schema:
    construct_disposition:
      vocabulary_ref: model/kernel/chain_contract.yaml#chain_contract.construct_admission.dispositions
      value: string
    per_target_causal_disposition:
      vocabulary_ref: model/kernel/chain_contract.yaml#chain_contract.causal_claim_admission.dispositions
      values: map
    per_target_failure_basis: map
    data_requirements_available: list
    data_requirements_missing: list
    per_target_plan: map
    narrower_answerable_targets: list
    answerability_status:
      state: [premise_rejected, causal_rejected, causal_unresolved, answerable, partially_answerable, descriptive_only, currently_unanswerable]
      basis: list

  rules:
    - Premise rejection terminates only targets that require the rejected entity.
    - Causal admission is target-relation specific.
    - Observational evidence begins noncausal and must earn causal scope affirmatively.
    - Intervention evidence may close the exact manipulated relation when its full burden passes.
    - A decisive intervention must not be rejected merely because it is therapeutic.
    - Intervention effects do not automatically establish etiology endogenous mechanism construct validity or cross-scale explanation.
    - Prediction is required when entailed by the target claim rather than as a universal checkbox.
    - Source narrative cannot replace missing data or bridges.
    - A valid narrower relation survives failure of a broader claim.
