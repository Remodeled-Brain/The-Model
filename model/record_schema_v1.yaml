# model/record_schema_v1.yaml — CANDIDATE
# Shared per-paper, per-agent ingest record for ADR 0003 concurrent multi-LLM ingest.
# BLOCKED for adoption until ADR 0003 identity decisions close (see depends_on). A schema is
# required before any checkpoint comparison can mean anything, but its identity fields cannot be
# finalized before paper_id resolution and the <agent> composite key are decided.
record_schema_v1:
  status: candidate
  layer: support_layer   # ingest records are support-layer only; never claim-layer
  depends_on:
    - adr_0003.paper_id_resolution      # DOI-normalized / alt-id table / content-hash / late-DOI merge / quarantine
    - adr_0003.agent_key                # family/version path key + run_id as a record field

  fields:
    schema_version:
      const: v1
      required: true
    paper_id:
      required: true
      source: adr_0003_identity_resolution
      note: canonical id resolved BEFORE any write; never a raw DOI/hash guess
    agent:
      required: true
      form: family/version              # model identity = path key (ADR 0003 identity split)
    run_id:
      required: true
      note: run identity; provenance field, NOT a path component (ADR 0003 identity split)
    measured_substrate:
      required: true
    measured_variable:
      required: true
    grouping_variable:
      required: true
      note: cohort/grouping variable preserved from Phase A; a handle, never causal
    handle_dependencies:
      required: true
      note: author terms stripped or marked (diagnostic/region/biomarker/spectrum/controller/conservation/clinical-promise)
    post_strip_claim:
      required: true
      form: post_strip_claim_form        # see model/06 (candidate slot taxonomy)
      note: if the claim cannot be slotted, it cannot ground or promote
    gate_results:
      required: true
      per_gate_state: [pass, fail, not_applicable, unresolved]
      note: >
        each Phase-B gate records one state; not_applicable and unresolved are distinct from fail.
        intersecting results follow gate_intersection_semantics (05): only fail denies permissions;
        not_applicable and unresolved never grant grounding but are not treated as fail.
    support_channels:
      required: true
      note: accumulate (union); nothing lost on failure
    blocked_roles:
      required: true
      note: node_grounding / promotion / prediction, per most-restrictive surviving cap
    promotion_status:
      enum: [none, candidate, blocked]
      required: true
    visibility_priority:
      required: true
      note: bounded by visibility_priority_cap (05); descriptive volume raises watchlist only
    supersedes:
      required: false
      note: append-only + generated "current" pointer; retries do not overwrite

  invariants:
    support_layer_only: true
    no_claim_layer_write: true
    identity_resolved_before_write: true
