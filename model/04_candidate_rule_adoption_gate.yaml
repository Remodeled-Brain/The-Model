PATCH_ADOPTION_GATE:
  status: candidate
  layer: workflow
  purpose: >
    Prevent sycophantic scaffold editing and candidate-rule overintegration.

  trigger:
    - user proposes scaffold rule
    - assistant proposes scaffold rule
    - external model proposes scaffold rule
    - paper-derived rule candidate appears
    - candidate changelog item appears

  required_checks:
    goal_fit:
      question: Does it support the current version goal?
      required: true

    layer_fit:
      question: Does it belong in claim layer, support layer, validator, fixture, prose, changelog, or workflow?
      required: true

    contradiction_check:
      question: Does it conflict with settled nodes or prior version commitments?
      required: true

    reification_check:
      question: Does it introduce a new magic noun, hidden operator, seat, controller, essence, or internal object?
      required: true

    operation_product_check:
      question: Does it fuse a process with the product produced by that process?
      required: true

    chain_generation_check:
      question: Does it generate a physical path or merely sort definitions?
      required: true

    redundancy_check:
      question: Does an existing rule already cover it?
      required: true

    failure_mode_check:
      question: How can this rule misfire?
      required: true

    minimal_patch_check:
      question: What is the smallest safe form?
      required: true

    verdict_required:
      allowed_verdicts:
        - accept
        - accept_with_edits
        - hold
        - reject
      required: true

  forbidden_behavior:
    - treating user phrasing as accepted scaffold text by default
    - logging candidate rules as settled
    - praising fit without testing drift
    - expanding every suggestion into a full rule without compression
    - using candidate-rule compatibility as proof of validity

  anti_sycophancy_filter:
    rule: >
      A candidate rule is not adopted because it fits the model's current direction.
      It must survive layer placement, contradiction review, reification review,
      redundancy review, and failure-mode review.

  output_template:
    - verdict
    - layer
    - fit_to_version_goal
    - internal_consistency_effect
    - risks_and_failure_modes
    - overlap_or_redundancy
    - minimal_safe_form
    - adoption_status
