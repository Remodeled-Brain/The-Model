candidate_adoption_gate:
  status: candidate
  layer: governance
  purpose: Prevent candidate proposals from entering canonical runtime state without review.

  triggers:
    - user_proposal
    - assistant_proposal
    - external_model_feedback
    - paper_derived_rule
    - architecture_change

  required_checks:
    - goal_fit
    - layer_fit
    - contradiction
    - reification
    - target_identity_generation
    - speaker_corpus_target_separation
    - recoverable_identity_shortcuts
    - operational_equivalence
    - heterogeneity_generation
    - transport_scope
    - operation_product
    - chain_generation
    - universal_physical_continuity
    - biological_metabolic_binding
    - no_magic_transition
    - physical_chain_visibility
    - redundancy
    - failure_modes
    - calibration
    - statistical_qualification
    - retrieval_source_boundary
    - coupled_file_drift
    - minimal_patch
    - semantic_conformance
    - narrative_invariance
    - data_sensitivity
    - scope_separation
    - positive_causal_control
    - provider_result_freshness

  target_identity_conformance:
    kernel_ref: model/kernel/target_identity.yaml
    runtime_ref: model/runtime/target_identity_gate.yaml
    ingest_ref: model/ingest/target_identity_extraction.yaml
    record_ref: model/ingest/target_identity_record_schema.yaml
    validator: scripts/validate_target_identity.py
    requirements:
      - target identity is generated from recoverable operations rather than inherited from terminology
      - speaker intent remains separate from corpus-defined and measured targets
      - a shortcut is accepted when its generator is recoverable and scope-bounded
      - non-equivalent operationalizations remain separate target relations
      - heterogeneity preserves identity only when generated differentiators predict the variation
      - evidence binds to exact measured or constructed relations before shared names
      - randomization and effect magnitude cannot repair target identity or transport
      - domain cartridges supply regressions and vocabulary rather than target-identity trigger lists
      - exact narrow relations survive broader identity failure

  semantic_conformance:
    policy_ref: conformance/required_runs.json
    decision_record_ref: conformance/decision_record.schema.json
    resource_validator: scripts/validate_resource_retrieval.py
    statistical_validator: scripts/validate_statistical_qualifiers.py
    causal_validator: scripts/validate_conformance.py
    physical_validator: scripts/validate_physical_continuity.py
    target_identity_validator: scripts/validate_target_identity.py
    adoption_validator: scripts/validate_adoption.py
    requirements:
      - every critical generic and active-cartridge fixture passes
      - narrative-only mutations preserve causal closure physical-chain and metabolic-binding results
      - data mutations change results when the causal burden changes
      - target-identity fixtures separate exact measured relations from broader named targets
      - user-imposed retrieval and source boundaries are preserved
      - every retrieved or remembered claim passes ordinary admission rather than source authority
      - numerical claims are qualified separately for information magnitude precision separation optimism stability calibration multiplicity and transport
      - raw accuracy nominal row count and statistical significance cannot substitute for the qualifier required by the claim
      - neuroscience fixtures preserve subject family site scanner cohort and time dependencies and prevent pipeline leakage
      - every biological or behavioral answer exposes a physical chain or explicit open chain slots
      - biological scope binds through metabolically maintained state
      - metabolism energy activation signaling and named components cannot act as replacement operators
      - exact intervention causality remains separate from target identity transport etiology endogenous mechanism and route closure
      - a decisive intervention may retain exact causality while intermediate physical mechanics remain partial
      - mechanistic language requires closed physical and metabolic routes
      - decisive-intervention positive controls receive causal admission at exact scope
      - provider result hashes match the runtime kernel cartridge fixture and physical-contract versions under review
      - minimum independent run count is satisfied with zero critical failures
    rule: Structural CI validates the harness. Adoption requires fresh provider executions recorded under conformance/results.

  verdicts:
    - accept
    - accept_with_edits
    - hold
    - reject

  invariants:
    explicit_adoption_required: true
    directional_fit_is_not_validity: true
    model_agreement_is_not_validity: true
    runtime_manifest_entry_requires_adoption: true
    review_record_cannot_override_canonical_source: true
    structural_ci_is_not_semantic_proof: true
    adoption_requires_fresh_provider_results: true
    critical_semantic_failure_tolerance: zero
    reject_everything_is_not_conformance: true
    target_identity_is_generated_not_named: true
    speaker_intent_is_not_construct_identity: true
    corpus_agreement_is_not_construct_identity: true
    heterogeneity_must_be_generated: true
    biology_has_no_separate_causal_currency: true
    metabolism_is_not_a_magic_operator: true
    open_physical_segments_remain_visible: true
    numerical_strength_cannot_repair_identity_or_chain_failure: true
    user_source_limits_control_retrieval: true

  required_output:
    - verdict
    - layer
    - fit
    - contradiction_or_consistency_effect
    - risks
    - redundancy
    - minimal_safe_form
    - target_identity_status
    - speaker_corpus_separation_status
    - heterogeneity_generation_status
    - statistical_qualification_status
    - retrieval_source_boundary_status
    - semantic_conformance_status
    - physical_continuity_status
    - metabolic_binding_status
    - provider_result_freshness
    - adoption_status
