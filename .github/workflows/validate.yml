name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main
      - "candidate/**"
      - "release/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate manifests, builds, and fixtures
        run: python scripts/validate_repo.py
      - name: Validate external retrieval and overlap handling
        run: python scripts/validate_resource_retrieval.py
      - name: Validate statistical qualifiers and neuroscience extensions
        run: python scripts/validate_statistical_qualifiers.py
      - name: Validate premise rejection and evidence weighting
        run: python scripts/validate_model_policy.py
      - name: Validate target identity reconstruction
        run: python scripts/validate_target_identity.py
      - name: Validate semantic and adoption conformance contracts
        run: python scripts/validate_conformance.py
      - name: Validate physical continuity and metabolic binding
        run: python scripts/validate_physical_continuity.py --fixtures-only

  publish_v5_r2:
    if: ${{ github.event_name == 'pull_request' && github.head_ref == 'packet/v0.05-v5-r2' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out packet branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate and verify packet revision
        run: python scripts/publish_v0_05_v5_r2.py
      - name: Commit generated packets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packets/v0.05-v5-r2
          git commit -m "Publish refreshed v0.05-v5-r2 runtime packets"
          git push origin HEAD:${{ github.head_ref }}
