name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main
      - "candidate/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate manifests, builds, and fixtures
        shell: bash
        run: |
          set -o pipefail
          python scripts/validate_repo.py 2>&1 | tail -100
