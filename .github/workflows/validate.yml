name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main
      - "candidate/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate manifests, builds, and fixtures
        id: repository-validation
        continue-on-error: true
        shell: bash
        run: python scripts/validate_repo.py > validation.log 2>&1
      - name: Upload failed validation log
        if: steps.repository-validation.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: validation-log
          path: validation.log
          retention-days: 3
      - name: Report validation result
        if: always()
        shell: bash
        run: |
          cat validation.log
          test "${{ steps.repository-validation.outcome }}" = "success"
